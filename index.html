<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-pop Fan Type Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="quiz-container">
    <div id="quiz-screen">
      <h1>K-pop Fan Type Quiz</h1>
      <p class="subtitle">Answer 8 questions to find your fan type</p>

      <div class="progress">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <div class="question-number" id="question-number"></div>
      <div class="question" id="question-text"></div>
      <div class="answers" id="answer-buttons"></div>

      <div class="controls">
        <button class="prev-btn" id="prev-btn">Previous</button>
        <button class="next-btn" id="next-btn">Next</button>
      </div>
    </div>

    <div id="result-screen" class="hidden">
      <div class="result-box">
        <h2>Your Result</h2>
        <div class="result-type" id="result-type"></div>
        <div class="result-description" id="result-description"></div>
        <button class="restart-btn" id="restart-btn">Try Again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
